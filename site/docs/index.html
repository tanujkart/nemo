<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEMO — Documentation</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:       #f0f0eb;
        --surface:  #e8e8e2;
        --border:   #d0d0c8;
        --text:     #2a2a28;
        --text-dim: #7a7a72;
        --accent:   #3a6a90;
      }

      html, body {
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "SF Mono", "Fira Code", "Consolas", monospace;
        font-size: 13px;
      }

      .page {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }

      .back {
        display: inline-block;
        font-size: 11px;
        font-weight: 600;
        color: var(--accent);
        text-decoration: none;
        margin-bottom: 32px;
      }

      .back:hover { text-decoration: underline; }

      h1 {
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 0.15em;
        margin-bottom: 4px;
      }

      .subtitle {
        font-size: 11px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 40px;
      }

      h2 {
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text);
        margin-top: 36px;
        margin-bottom: 12px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
      }

      p, li {
        font-size: 12px;
        line-height: 1.7;
        color: var(--text);
      }

      p + p { margin-top: 10px; }

      ul, ol {
        padding-left: 20px;
        margin-top: 8px;
      }

      li { margin-bottom: 4px; }

      code {
        font-size: 11px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 1px 5px;
      }

      .placeholder {
        margin-top: 24px;
        padding: 20px;
        background: var(--surface);
        border: 1px dashed var(--border);
        border-radius: 6px;
        text-align: center;
        color: var(--text-dim);
        font-size: 11px;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <a href="../" class="back">&larr; Back to Dashboard</a>

      <h1>NEMO</h1>
      <p class="subtitle">Documentation</p>

      <div class="placeholder">Documentation content coming soon.</div>
    </div>
  </body>
</html>
